<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AGS Chord Finder Test</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#050711;color:white}
    .wrap{max-width:1000px;margin:0 auto;padding:40px 20px;text-align:center}
    .card{background:#0b1020;border:1px solid #8f7bff;border-radius:20px;padding:30px;margin-top:20px}
    button,select{padding:12px 16px;border-radius:10px;margin:8px}
    button{background:#8f7bff;color:#050711;font-weight:bold;border:0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Alien Guitar Secrets Chord Finder</h1>
    <p>If you can see this and the button works, Netlify is working.</p>

    <select id="root">
      <option>C</option><option>D</option><option>E</option><option>F</option><option>G</option><option>A</option><option>B</option>
    </select>

    <select id="type">
      <option>Major</option><option>Minor</option><option>Major 7</option><option>Minor 7</option><option>Dominant 7</option>
    </select>

    <button onclick="showChord()">Test Chord Finder</button>

    <div class="card" id="result">Waiting...</div>
  </div>

  <script>
    function showChord(){
      var root=document.getElementById('root').value;
      var type=document.getElementById('type').value;
      document.getElementById('result').innerHTML='<h2>'+root+' '+type+'</h2><p>JavaScript is working.</p>';
    }
  </script>
</body>
</html>
